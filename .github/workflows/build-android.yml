name: Build Android APK

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Optional release tag (e.g. v0.2.0). Leave blank for an artifact-only build.'
        required: false
        default: ''

concurrency:
  group: build-android-${{ github.ref }}
  cancel-in-progress: false

env:
  UNITY_VERSION: 6000.4.7f1

jobs:
  build:
    name: Android APK
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Free disk space (Ubuntu runner is tight)
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android/sdk/ndk /opt/ghc
          df -h

      - name: Cache Library
        uses: actions/cache@v4
        with:
          path: Library
          key: Library-Android-${{ env.UNITY_VERSION }}-${{ hashFiles('Assets/**', 'Packages/**', 'ProjectSettings/**') }}
          restore-keys: |
            Library-Android-${{ env.UNITY_VERSION }}-
            Library-Android-

      - name: Build Android
        uses: game-ci/unity-builder@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL:   ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          unityVersion: ${{ env.UNITY_VERSION }}
          targetPlatform: Android
          buildMethod: StrafAdvance.Editor.BatchBuilder.BuildAndroid
          androidExportType: androidPackage
          androidVersionCode: ${{ github.run_number }}
          buildName: StrafeAdvance
          allowDirtyBuild: true

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: StrafeAdvance-apk
          path: |
            build/Android/*.apk
            StrafeAdvance.apk
          if-no-files-found: warn
          retention-days: 30

      - name: Attach APK to GitHub release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/Android/*.apk
            StrafeAdvance.apk
          fail_on_unmatched_files: false
          generate_release_notes: true
